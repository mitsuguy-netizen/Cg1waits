<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG1 Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#111827; color:white; font-family:system-ui; padding:8px; }
        .card { 
            background:#1f2937; 
            padding:9px 12px; 
            margin-bottom:7px; 
            border-radius:12px; 
        }
        .wait { font-size:2.65rem; font-weight:bold; line-height:1; }
        .star { font-size:2.1rem; padding:2px 6px; }
        .ride-name { font-size:1.95rem; line-height:1.1; font-weight:500; }
    </style>
</head>
<body>
    <div class="flex justify-between items-center mb-3">
        <h1 class="text-xl font-bold text-blue-400">CG1 Watch</h1>
        <div id="clock" class="font-mono text-base"></div>
    </div>
    
    <select id="park" onchange="loadData()" class="w-full p-3 bg-gray-800 rounded-2xl text-lg mb-4">
        <option value="epcot" selected>EPCOT</option>
        <option value="mk">MK</option>
        <option value="hs">HS</option>
        <option value="ak">AK</option>
    </select>

    <div class="flex gap-2 mb-4">
        <button onclick="cycleMainFilter()" id="mainBtn" class="flex-1 py-3 bg-purple-600 rounded-2xl text-sm">All</button>
        <button onclick="cycleSort()" id="sortBtn" class="flex-1 py-3 bg-blue-600 rounded-2xl text-sm">Shortest</button>
        <button onclick="loadData()" class="flex-1 py-3 bg-gray-700 rounded-2xl text-sm">Refresh</button>
    </div>

    <div id="status" class="text-center text-xs mb-3"></div>
    <div id="list"></div>

    <script>
        let currentRides = [];
        let favorites = JSON.parse(localStorage.getItem('cg1Favorites')) || [];
        let mainFilter = 'all'; 
        let sortMode = 'shortest';

        // Very explicit ride list based on your feedback
        const trueRides = new Set([
            "Journey Into Imagination with Figment", "Figment", "Soarin' Around the World", 
            "Gran Fiesta Tour Starring The Three Caballeros", "Tres Caballeros",
            "Rise of the Resistance", "Alien Swirling Saucers", "Star Tours: The Adventures Continue", "Star Tours",
            "It's a Small World", "Buzz Lightyear's Space Ranger Spin", "Under the Sea \~ Journey of the Little Mermaid",
            "Guardians of the Galaxy: Cosmic Rewind", "Test Track", "Frozen Ever After", "TRON Lightcycle / Run",
            "Space Mountain", "Big Thunder Mountain Railroad", "Seven Dwarfs Mine Train", "Tiana's Bayou Adventure",
            "Pirates of the Caribbean", "Haunted Mansion", "Jungle Cruise", "The Twilight Zone Tower of Terror",
            "Rock 'n' Roller Coaster", "Millennium Falcon: Smugglers Run", "Slinky Dog Dash",
            "Expedition Everest", "Avatar Flight of Passage", "Kilimanjaro Safaris", "Na'vi River Journey",
            "Peter Pan's Flight", "The Many Adventures of Winnie the Pooh", "Toy Story Mania!", "Mission: SPACE"
        ]);

        const parks = {
            epcot: "47f90d2c-e191-4239-a466-5892ef59a88b",
            mk: "75ea578a-adc8-4116-a54d-dccb60765ef9",
            hs: "288747d1-8b4f-4a64-867e-ea7c9b27bad8",
            ak: "1c84a229-8862-4648-9c71-378ddd2c7693"
        };

        function updateClock() {
            const clockEl = document.getElementById('clock');
            setInterval(function() {
                clockEl.textContent = new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
            }, 1000);
        }

        async function loadData() {
            const status = document.getElementById('status');
            status.textContent = "Loading...";
            try {
                const pid = parks[document.getElementById('park').value];
                const res = await fetch("https://api.themeparks.wiki/v1/entity/" + pid + "/live");
                const data = await res.json();

                currentRides = (data.liveData || []).filter(function(item) { 
                    return item.entityType === "ATTRACTION"; 
                }).map(function(item) {
                    const name = item.name || '';
                    return {
                        id: item.id || 'ride-' + Math.random().toString(36).substr(2,9),
                        name: name,
                        wait: parseInt(item.queue && item.queue.STANDBY && item.queue.STANDBY.waitTime) || 0,
                        status: item.status || "Unknown",
                        isTrueRide: trueRides.has(name) || 
                                   name.toLowerCase().includes("mountain") || 
                                   name.toLowerCase().includes("coaster") || 
                                   name.toLowerCase().includes("run") ||
                                   name.toLowerCase().includes("tower") ||
                                   name.toLowerCase().includes("splash") ||
                                   name.toLowerCase().includes("flight") ||
                                   name.toLowerCase().includes("river") ||
                                   name.toLowerCase().includes("figment") ||
                                   name.toLowerCase().includes("soarin") ||
                                   name.toLowerCase().includes("resistance") ||
                                   name.toLowerCase().includes("swirling") ||
                                   name.toLowerCase().includes("star tours") ||
                                   name.toLowerCase().includes("small world") ||
                                   name.toLowerCase().includes("buzz lightyear") ||
                                   name.toLowerCase().includes("little mermaid")
                    };
                });

                renderList();
                status.textContent = "Updated";
            } catch(e) {
                status.textContent = "Error - tap Refresh";
            }
        }

        function isFav(id) { return favorites.indexOf(id) > -1; }

        function toggleStar(id) {
            if (isFav(id)) {
                favorites = favorites.filter(function(x) { return x !== id; });
            } else {
                favorites.push(id);
            }
            localStorage.setItem('cg1Favorites', JSON.stringify(favorites));
            renderList();
        }

        function cycleMainFilter() {
            if (mainFilter === 'all') mainFilter = 'ride';
            else if (mainFilter === 'ride') mainFilter = 'attraction';
            else if (mainFilter === 'attraction') mainFilter = 'show';
            else if (mainFilter === 'show') mainFilter = 'favs';
            else mainFilter = 'all';

            const btn = document.getElementById('mainBtn');
            if (mainFilter === 'ride') btn.textContent = 'Rides';
            else if (mainFilter === 'attraction') btn.textContent = 'Attractions';
            else if (mainFilter === 'show') btn.textContent = 'Shows';
            else if (mainFilter === 'favs') btn.textContent = '⭐ Favs';
            else btn.textContent = 'All';

            renderList();
        }

        function cycleSort() {
            if (sortMode === 'shortest') {
                sortMode = 'longest';
                document.getElementById('sortBtn').textContent = 'Longest';
            } else if (sortMode === 'longest') {
                sortMode = 'name';
                document.getElementById('sortBtn').textContent = 'Name';
            } else {
                sortMode = 'shortest';
                document.getElementById('sortBtn').textContent = 'Shortest';
            }
            renderList();
        }

        function renderList() {
            let rides = currentRides;

            if (mainFilter === 'ride') {
                rides = rides.filter(function(r) { return r.isTrueRide; });
            } else if (mainFilter === 'attraction') {
                rides = rides.filter(function(r) { return r.type === 'ATTRACTION'; });
            } else if (mainFilter === 'show') {
                rides = rides.filter(function(r) { return r.type === 'SHOW'; });
            } else if (mainFilter === 'favs') {
                rides = rides.filter(function(r) { return isFav(r.id); });
            }

            let sorted = rides.slice();
            if (sortMode === 'shortest') sorted.sort(function(a,b){ return a.wait - b.wait; });
            else if (sortMode === 'longest') sorted.sort(function(a,b){ return b.wait - a.wait; });
            else sorted.sort(function(a,b){ return a.name.localeCompare(b.name); });

            let html = "";
            for (var i = 0; i < sorted.length; i++) {
                var ride = sorted[i];
                var star = isFav(ride.id) ? '★' : '☆';
                var isDown = ride.status && (ride.status.toUpperCase().includes("CLOSE") || ride.status.toUpperCase().includes("DOWN"));
                
                var waitHtml;
                if (isDown) {
                    waitHtml = '<div style="font-size:2.4rem;color:#ef4444;font-weight:bold;">✕</div>';
                } else {
                    var waitColor = ride.wait < 30 ? '#4ade80' : (ride.wait < 60 ? '#fbbf24' : '#f87171');
                    waitHtml = '<div class="wait" style="color:' + waitColor + '">' + ride.wait + '</div>';
                }
                
                var shortName = ride.name.length > 25 ? ride.name.substring(0, 25) + '…' : ride.name;
                
                html += '<div class="card flex justify-between items-center" style="display:flex">' +
                    '<div style="flex:1; padding-right:8px">' +
                        '<div class="ride-name">' + shortName + '</div>' +
                    '</div>' +
                    '<div style="display:flex;align-items:center;gap:12px">' +
                        '<span onclick="toggleStar(\'' + ride.id + '\')" style="font-size:2.1rem;padding:2px 6px;cursor:pointer">' + star + '</span>' +
                        '<div style="text-align:right; min-width:70px">' +
                            waitHtml +
                            '<div style="font-size:0.7rem;margin-top:-4px">min</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            document.getElementById('list').innerHTML = html || "<p style='text-align:center;padding:20px 0;color:#9ca3af'>No items</p>";
        }

        setInterval(function() {
            if (document.visibilityState === 'visible') loadData();
        }, 180000);

        updateClock();
        loadData();
    </script>
</body>
</html>
