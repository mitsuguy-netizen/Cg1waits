<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG1 Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#111827; color:white; font-family:system-ui; padding:12px; }
        .card { background:#1f2937; padding:16px; margin-bottom:12px; border-radius:16px; }
        .wait { font-size:2.6rem; font-weight:bold; }
    </style>
</head>
<body>
    <h1 class="text-2xl font-bold text-blue-400 mb-4">CG1 Watch</h1>
    
    <select id="park" onchange="loadData()" class="w-full p-4 bg-gray-800 rounded-2xl text-xl mb-4">
        <option value="epcot" selected>EPCOT</option>
        <option value="mk">Magic Kingdom</option>
        <option value="hs">Hollywood Studios</option>
        <option value="ak">Animal Kingdom</option>
    </select>

    <button onclick="loadData()" class="w-full py-4 bg-blue-600 rounded-2xl mb-6">Refresh</button>
    
    <div id="status" class="text-center text-sm mb-4"></div>
    <div id="list"></div>

    <script>
        const parks = {
            epcot: "47f90d2c-e191-4239-a466-5892ef59a88b",
            mk: "75ea578a-adc8-4116-a54d-dccb60765ef9",
            hs: "288747d1-8b4f-4a64-867e-ea7c9b27bad8",
            ak: "1c84a229-8862-4648-9c71-378ddd2c7693"
        };

        async function loadData() {
            const status = document.getElementById('status');
            const list = document.getElementById('list');
            status.textContent = "Loading...";
            list.innerHTML = "";

            try {
                const pid = parks[document.getElementById('park').value];
                const res = await fetch("https://api.themeparks.wiki/v1/entity/" + pid + "/live");
                const data = await res.json();

                let html = "";
                (data.liveData || []).forEach(item => {
                    if (item.entityType !== "ATTRACTION") return;
                    const wait = item.queue?.STANDBY?.waitTime || 0;
                    html += `
                        <div class="card">
                            <div class="text-lg">${item.name}</div>
                            <div class="text-sm text-gray-400">${item.status || "Unknown"}</div>
                            <div class="wait ${wait < 30 ? 'text-green-400' : wait < 60 ? 'text-yellow-400' : 'text-red-400'}">
                                ${wait} min
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html || "<p class='text-center py-8'>No rides found</p>";
                status.textContent = "Updated just now";
            } catch(e) {
                status.textContent = "Error - try Refresh";
                console.error(e);
            }
        }

        loadData();
    </script>
</body>
</html>
