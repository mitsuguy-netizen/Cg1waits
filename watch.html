<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CG1 Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui; background: #111827; color: white; }
        .ride-card { padding: 16px; margin-bottom: 12px; border-radius: 16px; background: #1f2937; }
        .scroll-container { max-height: 85vh; overflow-y: auto; }
        .big-wait { font-size: 2.8rem; line-height: 1; font-weight: bold; }
        .star { font-size: 2.2rem; padding: 8px; }
    </style>
</head>
<body class="p-3 min-h-screen">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-5">
            <h1 class="text-2xl font-bold text-blue-400">CG1 Watch</h1>
            <div id="clock" class="font-mono text-base"></div>
        </header>

        <select id="park-select" class="w-full bg-gray-800 p-4 rounded-2xl text-xl mb-5" onchange="loadWaits()">
            <option value="mk">MK</option>
            <option value="epcot" selected>EPCOT</option>
            <option value="hs">HS</option>
            <option value="ak">AK</option>
        </select>

        <div class="flex gap-3 mb-6">
            <button onclick="toggleFavoritesFilter()" id="fav-btn" class="flex-1 py-4 text-lg rounded-2xl bg-purple-600">⭐ Favs</button>
            <button onclick="cycleSort()" id="sort-btn" class="flex-1 py-4 text-lg rounded-2xl bg-blue-600">Shortest</button>
            <button onclick="refreshData()" class="flex-1 py-4 text-lg rounded-2xl bg-gray-700">Refresh</button>
        </div>

        <div id="status" class="text-center text-sm text-gray-400 mb-4"></div>
        <div id="rides-list" class="scroll-container space-y-3"></div>
    </div>

    <script>
        let currentData = [];
        let favorites = JSON.parse(localStorage.getItem('cg1Favorites')) || [];
        let showOnlyFavorites = false;
        let sortMode = 'shortest';

        function updateClock() {
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
            }, 1000);
        }

        const parkMap = {
            'mk': '75ea578a-adc8-4116-a54d-dccb60765ef9',
            'epcot': '47f90d2c-e191-4239-a466-5892ef59a88b',
            'hs': '288747d1-8b4f-4a64-867e-ea7c9b27bad8',
            'ak': '1c84a229-8862-4648-9c71-378ddd2c7693'
        };

        async function fetchWaits(parkKey) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Loading...';
            try {
                const res = await fetch('https://api.themeparks.wiki/v1/entity/' + parkMap[parkKey] + '/live');
                const data = await res.json();
                currentData = processData(data);
                renderRides();
                statusEl.textContent = 'Updated • ' + currentData.length + ' rides';
            } catch(e) {
                statusEl.textContent = 'Using mock data';
                currentData = [
                    {id:'1', name:"Guardians of the Galaxy: Cosmic Rewind", wait:65, status:"Open"},
                    {id:'2', name:"Test Track", wait:40, status:"Open"},
                    {id:'3', name:"Frozen Ever After", wait:35, status:"Open"}
                ];
                renderRides();
            }
        }

        function processData(raw) {
            return (raw.liveData || []).filter(function(i) { return i.entityType === 'ATTRACTION'; }).map(function(item) {
                return {
                    id: item.id || 'ride-' + Math.random().toString(36).substr(2,9),
                    name: item.name,
                    wait: parseInt(item.queue && item.queue.STANDBY && item.queue.STANDBY.waitTime) || 0,
                    status: item.status || 'Unknown'
                };
            });
        }

        function isFavorite(id) { return favorites.indexOf(id) !== -1; }

        function toggleFavorite(id) {
            if (isFavorite(id)) {
                favorites = favorites.filter(function(x) { return x !== id; });
            } else {
                favorites.push(id);
            }
            localStorage.setItem('cg1Favorites', JSON.stringify(favorites));
            renderRides();
        }

        function toggleFavoritesFilter() {
            showOnlyFavorites = !showOnlyFavorites;
            document.getElementById('fav-btn').textContent = showOnlyFavorites ? 'All' : '⭐ Favs';
            renderRides();
        }

        function cycleSort() {
            if (sortMode === 'shortest') {
                sortMode = 'longest';
                document.getElementById('sort-btn').textContent = 'Longest';
            } else if (sortMode === 'longest') {
                sortMode = 'name';
                document.getElementById('sort-btn').textContent = 'Name';
            } else {
                sortMode = 'shortest';
                document.getElementById('sort-btn').textContent = 'Shortest';
            }
            renderRides();
        }

        function renderRides() {
            let filtered = showOnlyFavorites ? currentData.filter(function(r) { return isFavorite(r.id); }) : currentData;
            let sorted = filtered.slice();
            if (sortMode === 'shortest') {
                sorted.sort(function(a,b){ return a.wait - b.wait; });
            } else if (sortMode === 'longest') {
                sorted.sort(function(a,b){ return b.wait - a.wait; });
            } else {
                sorted.sort(function(a,b){ return a.name.localeCompare(b.name); });
            }

            let html = '';
            for (var i = 0; i < sorted.length; i++) {
                var ride = sorted[i];
                var star = isFavorite(ride.id) ? '★' : '☆';
                var starColor = isFavorite(ride.id) ? 'text-yellow-400' : 'text-gray-500';
                var waitColor = ride.wait < 30 ? 'text-green-400' : (ride.wait < 60 ? 'text-yellow-400' : 'text-red-400');
                html += '<div class="ride-card flex justify-between items-center">' +
                    '<div class="flex-1">' +
                        '<div class="text-xl font-medium">' + ride.name + '</div>' +
                        '<div class="text-sm text-gray-400">' + ride.status + '</div>' +
                    '</div>' +
                    '<div class="flex items-center gap-4">' +
                        '<span onclick="toggleFavorite(\'' + ride.id + '\')" class="star ' + starColor + '">' + star + '</span>' +
                        '<div class="text-right">' +
                            '<div class="big-wait ' + waitColor + '">' + ride.wait + '</div>' +
                            '<div class="text-xs -mt-1">min</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }

            document.getElementById('rides-list').innerHTML = html || '<div class="text-center py-8 text-gray-400">No rides loaded — tap Refresh</div>';
        }

        function loadWaits() {
            fetchWaits(document.getElementById('park-select').value);
        }

        function refreshData() {
            loadWaits();
        }

        // Auto refresh
        setInterval(function() {
            if (document.visibilityState === 'visible') refreshData();
        }, 180000);

        updateClock();
        loadWaits();
    </script>
</body>
</html>
