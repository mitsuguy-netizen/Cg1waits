<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG1 Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#111827; color:white; font-family:system-ui; padding:8px; }
        .card { 
            background:#1f2937; 
            padding:9px 12px; 
            margin-bottom:7px; 
            border-radius:12px; 
        }
        .wait { font-size:2.65rem; font-weight:bold; line-height:1; }
        .star { font-size:2.1rem; padding:2px 6px; }
        .ride-name { font-size:1.95rem; line-height:1.1; font-weight:500; }
        .version { font-size:0.7rem; color:#6b7280; text-align:center; margin-top:10px; }
    </style>
</head>
<body>
    <div class="flex justify-between items-center mb-3">
        <h1 class="text-xl font-bold text-blue-400">CG1 Watch</h1>
        <div id="clock" class="font-mono text-base"></div>
    </div>
    
    <select id="park" onchange="loadData()" class="w-full p-3 bg-gray-800 rounded-2xl text-lg mb-4">
        <option value="epcot" selected>EPCOT</option>
        <option value="mk">MK</option>
        <option value="hs">HS</option>
        <option value="ak">AK</option>
    </select>

    <div class="flex gap-2 mb-4">
        <button onclick="cycleMainFilter()" id="mainBtn" class="flex-1 py-3 bg-purple-600 rounded-2xl text-sm">All</button>
        <button onclick="cycleSort()" id="sortBtn" class="flex-1 py-3 bg-blue-600 rounded-2xl text-sm">Shortest</button>
        <button onclick="loadData()" class="flex-1 py-3 bg-gray-700 rounded-2xl text-sm">Refresh</button>
    </div>

    <div id="status" class="text-center text-xs mb-3"></div>
    <div id="list"></div>

    <div class="version">v1.3</div>

    <script>
        let currentRides = [];
        let favorites = JSON.parse(localStorage.getItem('cg1Favorites')) || [];
        let mainFilter = 'all'; 
        let sortMode = 'shortest';

        const trueRides = new Set([
            // Epcot
            "Journey Into Imagination with Figment", "Soarin' Around the World", "Soarin' Across America",
            "Gran Fiesta Tour Starring The Three Caballeros", "Test Track", "Frozen Ever After", 
            "Guardians of the Galaxy: Cosmic Rewind", "Mission: SPACE", "The Seas with Nemo & Friends",
            "Remy's Ratatouille Adventure", "Living with the Land", "Spaceship Earth",
            // Hollywood Studios
            "Star Tours: The Adventures Continue", "Alien Swirling Saucers", "The Twilight Zone Tower of Terror",
            "Slinky Dog Dash", "Mickey & Minnie's Runaway Railway", "Toy Story Mania!", 
            "Star Wars: Rise of the Resistance", "Millennium Falcon: Smugglers Run", "Rock 'n' Roller Coaster",
            // Magic Kingdom
            "Big Thunder Mountain Railroad", "Seven Dwarfs Mine Train", "Tiana's Bayou Adventure",
            "Pirates of the Caribbean", "Haunted Mansion", "Jungle Cruise", "Space Mountain",
            "It's a Small World", "Buzz Lightyear's Space Ranger Spin", "Under the Sea \~ Journey of the Little Mermaid",
            "Peter Pan's Flight", "The Many Adventures of Winnie the Pooh", "Prince Charming Regal Carrousel",
            "The Barnstormer", "Dumbo the Flying Elephant", "Mad Tea Party", "Tomorrowland Speedway",
            "Astro Orbiter", "The Magic Carpets of Aladdin", "Walt Disney World Railroad",
            "Tomorrowland Transit Authority PeopleMover", "Walt Disney's Enchanted Tiki Room",
            "Walt Disney's Carousel of Progress", "Swiss Family Treehouse",
            // Animal Kingdom
            "Kilimanjaro Safaris", "Na'vi River Journey", "Kali River Rapids", "Expedition Everest", 
            "Avatar Flight of Passage"
        ]);

        const parks = {
            epcot: "47f90d2c-e191-4239-a466-5892ef59a88b",
            mk: "75ea578a-adc8-4116-a54d-dccb60765ef9",
            hs: "288747d1-8b4f-4a64-867e-ea7c9b27bad8",
            ak: "1c84a229-8862-4648-9c71-378ddd2c7693"
        };

        function updateClock() {
            const clockEl = document.getElementById('clock');
            setInterval(function() {
                clockEl.textContent = new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
            }, 1000);
        }

        async function loadData() {
            const status = document.getElementById('status');
            status.textContent = "Loading...";
            try {
                const pid = parks[document.getElementById('park').value];
                const res = await fetch("https://api.themeparks.wiki/v1/entity/" + pid + "/live");
                const data = await res.json();

                currentRides = (data.liveData || []).filter(item => 
                    item.entityType === "ATTRACTION" || item.entityType === "SHOW"
                ).map(item => {
                    const name = item.name || '';
                    const lower = name.toLowerCase();
                    const isMeet = lower.includes("meet") || lower.includes("meets") || lower.includes("character");
                    const isNonRide = lower.includes("first order searches") || 
                                      lower.includes("animal encounters") || 
                                      lower.includes("feathered friends");
                    return {
                        id: item.id || 'ride-' + Math.random().toString(36).substr(2,9),
                        name: name,
                        wait: parseInt(item.queue && item.queue.STANDBY && item.queue.STANDBY.waitTime) || 0,
                        status: item.status || "Unknown",
                        type: item.entityType,
                        isTrueRide: !isMeet && !isNonRide && (
                            trueRides.has(name) ||
                            lower.includes("journey into imagination") ||
                            lower.includes("figment") ||
                            lower.includes("tower of terror") ||
                            lower.includes("rock 'n' roller coaster") ||
                            lower.includes("star tours") ||
                            lower.includes("mountain") || 
                            lower.includes("coaster") || 
                            lower.includes("run") ||
                            lower.includes("flight") ||
                            lower.includes("river") ||
                            lower.includes("soarin") ||
                            lower.includes("resistance") ||
                            lower.includes("swirling")
                        ),
                        isMeet: isMeet
                    };
                });

                renderList();
                status.textContent = "Updated";
            } catch(e) {
                status.textContent = "Error - tap Refresh";
            }
        }

        function isFav(id) { return favorites.indexOf(id) > -1; }

        function toggleStar(id) {
            if (isFav(id)) {
                favorites = favorites.filter(x => x !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('cg1Favorites', JSON.stringify(favorites));
            renderList();
        }

        function cycleMainFilter() {
            if (mainFilter === 'all') mainFilter = 'ride';
            else if (mainFilter === 'ride') mainFilter = 'attraction';
            else if (mainFilter === 'attraction') mainFilter = 'show';
            else if (mainFilter === 'show') mainFilter = 'meet';
            else if (mainFilter === 'meet') mainFilter = 'favs';
            else mainFilter = 'all';

            const btn = document.getElementById('mainBtn');
            if (mainFilter === 'ride') btn.textContent = 'Rides';
            else if (mainFilter === 'attraction') btn.textContent = 'Attractions';
            else if (mainFilter === 'show') btn.textContent = 'Shows';
            else if (mainFilter === 'meet') btn.textContent = 'Meets';
            else if (mainFilter === 'favs') btn.textContent = '⭐ Favs';
            else btn.textContent = 'All';

            renderList();
        }

        function cycleSort() {
            if (sortMode === 'shortest') {
                sortMode = 'longest';
                document.getElementById('sortBtn').textContent = 'Longest';
            } else if (sortMode === 'longest') {
                sortMode = 'name';
                document.getElementById('sortBtn').textContent = 'Name';
            } else {
                sortMode = 'shortest';
                document.getElementById('sortBtn').textContent = 'Shortest';
            }
            renderList();
        }

        function renderList() {
            let rides = currentRides;

            if (mainFilter === 'ride') {
                rides = rides.filter(r => r.isTrueRide);
            } else if (mainFilter === 'attraction') {
                rides = rides.filter(r => r.type === 'ATTRACTION' && !r.isTrueRide && !r.isMeet);
            } else if (mainFilter === 'show') {
                rides = rides.filter(r => r.type === 'SHOW' && !r.isMeet);
            } else if (mainFilter === 'meet') {
                rides = rides.filter(r => r.isMeet);
            } else if (mainFilter === 'favs') {
                rides = rides.filter(r => isFav(r.id));
            }

            let sorted = rides.slice();
            if (sortMode === 'shortest') sorted.sort((a,b) => a.wait - b.wait);
            else if (sortMode === 'longest') sorted.sort((a,b) => b.wait - a.wait);
            else sorted.sort((a,b) => a.name.localeCompare(b.name));

            let html = "";
            sorted.forEach(ride => {
                var star = isFav(ride.id) ? '★' : '☆';
                var isDown = ride.status && (ride.status.toUpperCase().includes("CLOSE") || ride.status.toUpperCase().includes("DOWN"));
                
                var waitHtml;
                if (isDown) {
                    waitHtml = '<div style="font-size:2.4rem;color:#ef4444;font-weight:bold;">✕</div>';
                } else {
                    var waitColor = ride.wait < 30 ? '#4ade80' : (ride.wait < 60 ? '#fbbf24' : '#f87171');
                    waitHtml = '<div class="wait" style="color:' + waitColor + '">' + ride.wait + '</div>';
                }
                
                var shortName = ride.name.length > 25 ? ride.name.substring(0, 25) + '…' : ride.name;
                
                html += '<div class="card flex justify-between items-center" style="display:flex">' +
                    '<div style="flex:1; padding-right:8px">' +
                        '<div class="ride-name">' + shortName + '</div>' +
                    '</div>' +
                    '<div style="display:flex;align-items:center;gap:12px">' +
                        '<span onclick="toggleStar(\'' + ride.id + '\')" style="font-size:2.1rem;padding:2px 6px;cursor:pointer">' + star + '</span>' +
                        '<div style="text-align:right; min-width:70px">' +
                            waitHtml +
                            '<div style="font-size:0.7rem;margin-top:-4px">min</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });

            document.getElementById('list').innerHTML = html || "<p style='text-align:center;padding:20px 0;color:#9ca3af'>No items</p>";
        }

        setInterval(function() {
            if (document.visibilityState === 'visible') loadData();
        }, 180000);

        updateClock();
        loadData();
    </script>
</body>
</html>
