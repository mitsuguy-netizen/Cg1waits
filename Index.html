<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG1 Waits 🕒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui; }
        .ride-card { transition: all 0.2s; }
        .scroll-container { max-height: 65vh; overflow-y: auto; scrollbar-width: thin; }
        .star { cursor: pointer; user-select: none; }
        @media (max-width: 480px) { 
            .ride-card { font-size: 1.1rem; padding: 1.2rem; }
            .text-4xl { font-size: 2.5rem; }
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-3">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 sticky top-0 bg-gray-950 py-2 z-10">
            <h1 class="text-2xl font-bold text-blue-400">CG1 Waits</h1>
            <div id="clock" class="font-mono text-lg"></div>
        </header>

        <select id="park-select" class="w-full bg-gray-800 p-3 rounded-xl text-lg mb-6" onchange="loadWaits()">
            <option value="mk">Magic Kingdom</option>
            <option value="epcot" selected>Epcot</option>
            <option value="hs">Hollywood Studios</option>
            <option value="ak">Animal Kingdom</option>
        </select>

        <div class="flex gap-2 mb-4">
            <button onclick="toggleFavoritesFilter()" id="fav-btn" class="flex-1 bg-purple-600 hover:bg-purple-500 py-2 rounded-xl">⭐ Favorites</button>
            <button onclick="cycleSort()" id="sort-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-xl">Sort: Shortest Wait</button>
            <button onclick="refreshData()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-xl">🔄 Refresh</button>
        </div>

        <div id="status" class="text-sm text-gray-400 mb-4"></div>

        <div id="rides-list" class="scroll-container space-y-3">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        // (Full script from previous version — same as the last working one with cycleSort, favorites, etc.)
        let currentData = [];
        let favorites = JSON.parse(localStorage.getItem('cg1Favorites')) || [];
        let showOnlyFavorites = false;
        let sortMode = 'shortest';

        function updateClock() {
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
            }, 1000);
        }

        const parkMap = {
            'mk': { name: 'Magic Kingdom', id: '75ea578a-adc8-4116-a54d-dccb60765ef9' },
            'epcot': { name: 'EPCOT', id: '47f90d2c-e191-4239-a466-5892ef59a88b' },
            'hs': { name: "Hollywood Studios", id: '288747d1-8b4f-4a64-867e-ea7c9b27bad8' },
            'ak': { name: 'Animal Kingdom', id: '1c84a229-8862-4648-9c71-378ddd2c7693' }
        };

        async function fetchWaits(parkKey) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Loading...';
            const park = parkMap[parkKey];

            try {
                const url = `https://api.themeparks.wiki/v1/entity/${park.id}/live`;
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const data = await res.json();
                currentData = processThemeParksData(data);
                renderRides(currentData);
                statusEl.textContent = `Updated • ${currentData.length} rides`;
            } catch (e) {
                statusEl.textContent = 'Mock data (offline)';
                currentData = getMockData();
                renderRides(currentData);
            }
        }

        function processThemeParksData(raw) {
            const rides = [];
            (raw.liveData || []).forEach(item => {
                if (item.entityType === 'ATTRACTION') {
                    const queue = item.queue?.STANDBY || {};
                    let wait = 0;
                    if (queue.waitTime != null) wait = parseInt(queue.waitTime) || 0;
                    rides.push({
                        id: item.id || 'ride-' + Math.random().toString(36).substr(2,9),
                        name: item.name,
                        wait: wait,
                        status: item.status || 'Unknown'
                    });
                }
            });
            return rides;
        }

        function getMockData() {
            return [{id:'1',name:"Guardians of the Galaxy: Cosmic Rewind",wait:65,status:"Open"},{id:'2',name:"Test Track",wait:40,status:"Open"},{id:'3',name:"Frozen Ever After",wait:35,status:"Open"},{id:'4',name:"TRON Lightcycle / Run",wait:30,status:"Open"}];
        }

        function isFavorite(rideId) { return favorites.includes(rideId); }

        function toggleFavorite(rideId) {
            if (favorites.includes(rideId)) favorites = favorites.filter(id => id !== rideId);
            else favorites.push(rideId);
            localStorage.setItem('cg1Favorites', JSON.stringify(favorites));
            renderRides(currentData);
        }

        function toggleFavoritesFilter() {
            showOnlyFavorites = !showOnlyFavorites;
            document.getElementById('fav-btn').textContent = showOnlyFavorites ? 'All Rides' : '⭐ Favorites';
            renderRides(currentData);
        }

        function cycleSort() {
            if (sortMode === 'shortest') { sortMode = 'longest'; document.getElementById('sort-btn').textContent = 'Sort: Longest'; }
            else if (sortMode === 'longest') { sortMode = 'name'; document.getElementById('sort-btn').textContent = 'Sort: Name'; }
            else { sortMode = 'shortest'; document.getElementById('sort-btn').textContent = 'Sort: Shortest Wait'; }
            renderRides(currentData);
        }

        function renderRides(rides) {
            const container = document.getElementById('rides-list');
            let filtered = showOnlyFavorites ? rides.filter(r => isFavorite(r.id)) : rides;
            let sorted = [...filtered];
            if (sortMode === 'shortest') sorted.sort((a,b)=>a.wait-b.wait);
            else if (sortMode === 'longest') sorted.sort((a,b)=>b.wait-a.wait);
            else sorted.sort((a,b)=>a.name.localeCompare(b.name));

            if (sorted.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-8">No rides — tap stars or Refresh</div>`;
                return;
            }

            container.innerHTML = sorted.map(ride => `
                <div class="ride-card bg-gray-900 p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex-1 pr-4">
                        <div class="font-semibold text-lg">${ride.name}</div>
                        <div class="text-sm text-gray-400">${ride.status}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div onclick="toggleFavorite('${ride.id}')" class="star text-3xl ${isFavorite(ride.id)?'text-yellow-400':'text-gray-500'}">
                            ${isFavorite(ride.id)?'★':'☆'}
                        </div>
                        <div class="text-right w-16">
                            <div class="text-4xl font-bold ${ride.wait<30?'text-green-400':ride.wait<60?'text-yellow-400':ride.wait>0?'text-red-400':'text-gray-400'}">
                                ${ride.wait}
                            </div>
                            <div class="text-xs -mt-1">min</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadWaits() {
            const parkKey = document.getElementById('park-select').value;
            fetchWaits(parkKey);
        }

        function refreshData() {
            loadWaits();
        }

        // Init
        updateClock();
        loadWaits();
    </script>
</body>
</html>
